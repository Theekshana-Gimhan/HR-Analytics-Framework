version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: simpala
      POSTGRES_PASSWORD: simpala123
      POSTGRES_DB: simpala
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simpala -d simpala"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://simpala:simpala123@db:5432/simpala
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001/api/v1
    ports:
      - "3000:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
