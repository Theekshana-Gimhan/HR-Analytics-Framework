steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/simpalahr-backend-dev:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '.'
    timeout: 900s

images:
  - 'gcr.io/$PROJECT_ID/simpalahr-backend-dev:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  
timeout: 900s
