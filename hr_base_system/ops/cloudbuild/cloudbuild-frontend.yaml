steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/simpalahr/simpalahr-frontend-dev:latest'
      - '-f'
      - 'frontend/Dockerfile'
      - '--build-arg'
      - 'VITE_API_BASE_URL=https://simpalahr-backend-dev-wxbl5wur4q-uc.a.run.app/api/v1'
      - '.'
    timeout: 900s

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/simpalahr/simpalahr-frontend-dev:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  
timeout: 900s
